{% extends 'gestion_asociacion/base.html' %} {% block title %}Añadir Nuevo Evento{% endblock %} {% block content %}
<div class="sidebar">
    <h2>Menú</h2>
    <a href="{% url 'dashboard' %}">Dashboard</a>
    <a href="{% url 'gestion' %}">Gestión de personal</a>
    <a href="{% url 'control' %}">Asistencia</a>
    <a href="{% url 'evaluaciones' %}">Evaluaciones</a>
    <a href="{% url 'capacitaciones' %}">Capacitaciones</a>
    <a href="{% url 'nomina' %}">Nómina</a>
    <a href="{% url 'comunicacion' %}">Comunicación interna</a>
</div>

<div class="main-content">
    <div class="form-container">
        <h2>Añadir Nuevo Evento</h2>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="titulo" placeholder="Título del evento" required>
            <input type="date" name="fecha" required>
            <textarea name="descripcion" placeholder="Descripción del evento" required></textarea>
            <button type="submit">Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
